id = "h264-nv12"
engines = ["ffmpeg", "gstreamer", "g2g"]
reference = "ffmpeg"
timeout-secs = 60

[input]
# generated by tools/gen-local-corpus.sh
path = "../local-corpus/testsrc-176x144.h264"

# semi-planar NV12 output (Y plane then interleaved UV): a repack of the
# decoder's native 4:2:0, so it stays bit-exact vs ffmpeg's nv12 framemd5.
[video]
width = 176
height = 144
format = "nv12"
