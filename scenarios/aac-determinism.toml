id = "aac-determinism"
engines = ["ffmpeg", "gstreamer", "g2g"]
reference = "ffmpeg"
timeout-secs = 60

[input]
# generated by tools/gen-local-corpus.sh
path = "../local-corpus/tone-stereo-44k-aac.ts"

# AAC is not bit-exact across decoders (lossy, implementation-defined rounding),
# so it uses determinism, not a cross-engine differential: each engine decodes
# to PCM repeatedly and its output must be byte-identical every run. This
# isolates nondeterminism without reference-quirk noise. threads = true also
# runs g2g's --threads variant and requires it to match.
[audio]
codec = "aac"
rate = 44100
channels = 2

[determinism]
runs = 3
threads = true
