id = "h264-outcome-diff"
engines = ["ffmpeg", "gstreamer", "g2g"]
reference = "ffmpeg"
timeout-secs = 30

# corrupt-input differential: flip bits inside NAL payloads (start codes / NAL
# headers stay intact so units still route to slice decode), then compare each
# engine's decode *outcome* to ffmpeg's. A crash / hang fails the run; the
# reported LENIENT / stricter splits are advisory triage. LENIENT (g2g decoded a
# stream ffmpeg refused) is the too-lenient-parser class worth investigating.
outcome-diff = true

[input]
# generated by tools/gen-local-corpus.sh
path = "../local-corpus/testsrc-176x144.h264"

[fault]
mode = "nal-payload"
seed = 1
count = 500
