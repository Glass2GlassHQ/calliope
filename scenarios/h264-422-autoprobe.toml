id = "h264-422-autoprobe"
# g2g's ffmpegdec emits 4:2:0 only, so it cannot match a 4:2:2 reference yet;
# ffmpeg vs gstreamer exercise the probed-format path for non-4:2:0 content.
engines = ["ffmpeg", "gstreamer"]
reference = "ffmpeg"
timeout-secs = 60

[input]
# generated by tools/gen-local-corpus.sh
path = "../local-corpus/testsrc-160x120-422.h264"

# no [video]: ffprobe reports yuv422p, engines convert to Y42B and hash that.
