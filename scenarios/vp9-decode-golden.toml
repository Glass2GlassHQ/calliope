# VP9 conformance: golden-check every engine's decoded output against the
# canonical Fluster md5. Exercises g2g's ffmpegdec VP9 path.
id = "vp9-decode-golden"
engines = ["ffmpeg", "gstreamer", "g2g"]
reference = "ffmpeg"
timeout-secs = 120
golden = true

[input]
corpus = "fluster/VP9-TEST-VECTORS/vp90-2-00-quantizer-00.webm/vp90-2-00-quantizer-00.webm"
