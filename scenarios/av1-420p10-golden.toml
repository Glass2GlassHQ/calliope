# av1-420p10-golden conformance: golden-check every engine against the canonical Fluster md5.
# g2g decodes the IVF container via ivfdemux + ffmpegdec.
id = "av1-420p10-golden"
engines = ["ffmpeg", "gstreamer", "g2g"]
reference = "ffmpeg"
timeout-secs = 120
golden = true

[input]
corpus = "fluster/AV1-TEST-VECTORS/av1-1-b10-00-quantizer-00/av1-1-b10-00-quantizer-00.ivf"
