id = "h264-nal-payload-fuzz"
engines = ["ffmpeg", "gstreamer", "g2g"]
reference = "ffmpeg"
timeout-secs = 30

[input]
# generated by tools/gen-local-corpus.sh (raw Annex-B elementary stream)
path = "../local-corpus/testsrc-176x144.h264"

# robustness: flip 500 bits inside NAL payloads only, leaving start codes and
# NAL headers intact so the corruption reaches slice decode / reconstruction
# instead of being rejected at the framer. Every engine must degrade gracefully.
[fault]
mode = "nal-payload"
seed = 1
count = 500
