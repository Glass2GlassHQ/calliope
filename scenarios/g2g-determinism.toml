id = "g2g-determinism"
engines = ["ffmpeg", "gstreamer", "g2g"]
reference = "ffmpeg"
timeout-secs = 60

[input]
# generated by tools/gen-local-corpus.sh
path = "../local-corpus/testsrc-176x144.h264"

# run each engine repeatedly and require byte-identical output. threads = true
# also runs g2g's --threads variant (one OS thread per element) and requires it
# to match the single-threaded output, catching threading-order bugs.
[determinism]
runs = 3
threads = true
