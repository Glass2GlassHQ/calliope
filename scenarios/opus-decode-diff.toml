id = "opus-decode-diff"
engines = ["ffmpeg", "gstreamer", "g2g"]
reference = "ffmpeg"
timeout-secs = 60

[input]
# generated by tools/gen-local-corpus.sh
path = "../local-corpus/tone-mono-48k.opus"

# Opus decodes bit-exactly across libopus-backed engines, so the decoded PCM is
# cross-engine differential. ffmpeg is pinned to its libopus decoder (see the
# ffmpeg adapter) so it agrees with gstreamer's opusdec and g2g's OpusDec; the
# whole PCM stream is hashed and compared, with a 3-engine majority vote naming
# any outlier. g2g currently retains the OpusHead pre-skip + end padding (emits
# every decoded frame instead of trimming), so it diverges and this scenario
# fails, naming g2g as the outlier: see TESTING.md "Bugs found".
[audio]
codec = "opus"
rate = 48000
channels = 1
