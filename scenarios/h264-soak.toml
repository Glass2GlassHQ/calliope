id = "h264-soak"
engines = ["ffmpeg", "gstreamer", "g2g"]
reference = "ffmpeg"
timeout-secs = 30

[input]
# generated by tools/gen-local-corpus.sh
path = "../local-corpus/testsrc-176x144.ts"

# stability: decode the same stream repeatedly, catch an intermittent crash or
# hang that a single pass would miss.
[soak]
iterations = 15
