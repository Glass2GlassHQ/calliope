id = "h265-420p10-decode"
engines = ["ffmpeg", "gstreamer", "g2g"]
reference = "ffmpeg"
timeout-secs = 60

[input]
# generated by tools/gen-local-corpus.sh (HEVC Main10)
path = "../local-corpus/testsrc-176x144-10bit.h265"

# 10-bit 4:2:0: every sample is a little-endian 2-byte word, so the frame is
# twice the 8-bit size. Exercises high-bit-depth decode + chunking.
[video]
width = 176
height = 144
format = "i420p10"
