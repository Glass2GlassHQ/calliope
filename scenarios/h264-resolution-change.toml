# Resolution-change oracle: decode a stream whose frame geometry switches
# mid-playback (176x144 -> 320x240 -> 128x96 -> 352x288, generated by
# tools/gen-local-corpus.sh) and require g2g to survive and emit the expected
# total decoded bytes. Targets g2g's own caps / buffer renegotiation. No pixel
# oracle: ffmpeg's CLI normalizes output geometry on a change, so the byte total
# (per-frame sizes from ffprobe) is the check.
id = "h264-resolution-change"
engines = ["g2g"]
reference = "g2g"
timeout-secs = 60
resolution-change = true

[input]
path = "../local-corpus/res-change-multi.h264"
