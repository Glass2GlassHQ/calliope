id = "h264-ts-bitflip"
engines = ["ffmpeg", "gstreamer", "g2g"]
reference = "ffmpeg"
timeout-secs = 30

[input]
# generated by tools/gen-local-corpus.sh
path = "../local-corpus/testsrc-176x144.ts"

# robustness: flip 500 bits through a valid TS stream and require every engine
# to reject or drop gracefully, never crash or hang.
[fault]
mode = "bit-flip"
seed = 1
count = 500
